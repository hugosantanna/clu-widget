[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "clu-widget"
version = "0.1.0"
description = "A tiny terminal widget showing live Claude Code usage stats with an animated creature"
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [{ name = "hsantanna" }]
keywords = ["claude", "anthropic", "terminal", "widget", "usage"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Utilities",
]
dependencies = [
    "rich",
    "requests",
]

[project.optional-dependencies]
keyring = ["keyring"]

[project.urls]
Homepage = "https://github.com/hsantanna88/clu-widget"
Repository = "https://github.com/hsantanna88/clu-widget"
Issues = "https://github.com/hsantanna88/clu-widget/issues"

[project.scripts]
clu = "clu.widget:main"
